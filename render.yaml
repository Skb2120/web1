services:
  - type: web
    name: portfolio-backend
    env: node
    plan: free
    buildCommand: npm install --production
    startCommand: node server/index.js
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        value: https://sarathiotdev.netlify.app
      - key: SUPABASE_URL
        fromService:
          type: env
          property: SUPABASE_URL
      - key: SUPABASE_ANON_KEY
        fromService:
          type: env
          property: SUPABASE_ANON_KEY
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        fromService:
          type: env
          property: SMTP_USER
      - key: SMTP_PASS
        fromService:
          type: env
          property: SMTP_PASS
      - key: SMTP_FROM
        fromService:
          type: env
          property: SMTP_FROM
      - key: SMTP_TO
        value: Sarathkumarbbe@gmail.com
